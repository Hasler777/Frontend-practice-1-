<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточка товара</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="product-card">
    <img class="product-card__image" src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" alt="Товар">
    <div class="product-card__content">
      <h2 class="product-card__title">Наручные часы</h2>
      <p class="product-card__description">Стильные наручные часы с минималистичным дизайном. Водонепроницаемый корпус, кожаный ремешок, кварцевый механизм.</p>
      <span class="product-card__price">4 990 ₽</span>
      <a class="btn" href="#">В корзину</a>
    </div>
  </div>
</body>
</html>
